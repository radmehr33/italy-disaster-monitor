<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🇮🇹 Italy National Disaster & Sensor Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
:root{--bg:#0b1117;--pn:#131a24;--pn2:#192231;--bd:#1e3044;--tx:#c8d6e5;--dm:#5a7a99;--ac:#00b4d8;--dg:#ef4444;--wn:#f59e0b;--ok:#22c55e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','Consolas',monospace;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--pn);border-bottom:1px solid var(--bd);z-index:1000;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand h1{font-size:13px;font-weight:600;letter-spacing:.5px}
.brand h1 b{color:var(--ac)}
.hr{display:flex;align-items:center;gap:18px;font-size:11px}
.live{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pls 2s infinite;display:inline-block;margin-right:4px}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.dim{color:var(--dm)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;background:var(--pn);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.tab{flex:1;padding:8px;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dm);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tc{display:none;flex:1;overflow-y:auto}
.tc.on{display:flex;flex-direction:column}
.tc::-webkit-scrollbar{width:5px}
.tc::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.sh{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dm);padding:10px 12px 4px}
.si{display:flex;align-items:center;gap:8px;padding:5px 12px;cursor:pointer;transition:.15s;font-size:11px;border-left:3px solid transparent}
.si:hover{background:rgba(255,255,255,.03)}
.si.on{background:rgba(0,180,216,.08);border-left-color:var(--ac)}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.ok{background:var(--ok)}.sd.ld{background:var(--wn);animation:pls 1s infinite}.sd.er{background:var(--dg)}.sd.pd{background:var(--dm)}
.sn{flex:1;min-width:0}.sn span{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.sn small{font-size:9px;color:var(--dm)}
.sc{font-size:10px;color:var(--dm);font-weight:600;flex-shrink:0}
.pills{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px}
.pill{padding:3px 8px;border-radius:10px;font-size:9px;cursor:pointer;background:var(--pn2);border:1px solid var(--bd);color:var(--dm);transition:.15s}
.pill.on{background:var(--ac);border-color:var(--ac);color:#fff}
.pill:hover{border-color:var(--ac)}
.dp{padding:10px 12px}
.dc{background:var(--pn2);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-bottom:10px}
.dc .dt{font-size:13px;font-weight:600;margin-bottom:2px}
.dc .ds{font-size:10px;color:var(--dm);margin-bottom:10px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dm{background:rgba(0,0,0,.25);border-radius:5px;padding:8px}
.dm .dl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--dm)}
.dm .dv{font-size:16px;font-weight:700;margin-top:1px}
.dm .du{font-size:9px;color:var(--dm);font-weight:400}
.cb canvas{width:100%!important;height:140px!important}
.ns{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--dm);text-align:center;font-size:11px;gap:6px}
.mw{flex:1;position:relative}
#map{width:100%;height:100%}
.leaflet-container{background:#080d12}
.leaflet-control-zoom a{background:var(--pn)!important;color:var(--tx)!important;border-color:var(--bd)!important}
.leaflet-popup-content-wrapper{background:var(--pn);color:var(--tx);border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.leaflet-popup-tip{background:var(--pn)}
.leaflet-popup-content{font-family:inherit;font-size:11px;margin:10px 12px;line-height:1.5}
.pt{font-weight:600;font-size:12px;margin-bottom:4px}
.pr{display:flex;justify-content:space-between;padding:2px 0;gap:8px}
.pl{color:var(--dm);flex-shrink:0}
.pv{font-weight:600;text-align:right}
.pb{display:block;width:100%;margin-top:6px;padding:5px;background:var(--ac);color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600}
.bb{display:flex;align-items:center;justify-content:space-between;padding:4px 16px;background:var(--pn);border-top:1px solid var(--bd);font-size:10px;color:var(--dm);flex-shrink:0}
.bb .sts{display:flex;gap:14px}
.ab{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,.15);border:1px solid var(--dg);color:var(--dg);padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;z-index:1000;display:none;backdrop-filter:blur(8px);white-space:nowrap}
.ml{position:absolute;bottom:12px;left:12px;background:var(--pn);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;z-index:1000;font-size:9px;max-height:280px;overflow-y:auto}
.ml h4{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin:4px 0 2px}
.ml .lr{display:flex;align-items:center;gap:5px;padding:1px 0}
.ml .ld{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
/* Alert system */
.alert-tab-badge{background:var(--dg);color:#fff;font-size:8px;padding:1px 5px;border-radius:8px;margin-left:4px;animation:pls 1.5s infinite}
.alert-feed{display:flex;flex-direction:column;gap:2px;padding:4px 8px}
.af-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--pn2);border:1px solid var(--bd);border-radius:6px;cursor:pointer;transition:.15s;font-size:10px}
.af-item:hover{background:rgba(255,255,255,.04)}
.af-item.sev-critical{border-left:3px solid var(--dg)}
.af-item.sev-warning{border-left:3px solid var(--wn)}
.af-item.sev-info{border-left:3px solid var(--ac)}
.af-sev{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
.af-sev.critical{background:rgba(239,68,68,.2);color:var(--dg)}
.af-sev.warning{background:rgba(245,158,11,.2);color:var(--wn)}
.af-sev.info{background:rgba(0,180,216,.2);color:var(--ac)}
.af-body{flex:1;min-width:0}
.af-title{font-weight:600;font-size:11px;margin-bottom:2px}
.af-desc{color:var(--dm);font-size:9px;line-height:1.3}
.af-time{color:var(--dm);font-size:8px;margin-top:3px}
.af-summary{display:flex;gap:12px;padding:8px 12px;font-size:10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.af-summary .af-cnt{display:flex;align-items:center;gap:4px}
.pulse-marker{animation:pulseGlow 1.5s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 4px rgba(239,68,68,.4)}50%{box-shadow:0 0 16px rgba(239,68,68,.8),0 0 30px rgba(239,68,68,.3)}}
.alert-sound-btn{position:absolute;top:10px;right:12px;z-index:1001;background:var(--pn);border:1px solid var(--bd);color:var(--dm);padding:4px 8px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px}
.alert-sound-btn:hover{color:var(--tx);border-color:var(--ac)}
.lo{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;transition:opacity .5s}
.lo.hd{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spn .7s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}
.lt{font-size:12px;color:var(--dm)}
.lbw{width:240px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.lb{height:100%;background:var(--ac);width:0%;transition:width .3s}
  </style>
</head>
<body>
<div class="lo" id="lo"><div class="sp"></div><div class="lt" id="lt">Initializing Italy Disaster Monitor...</div><div class="lbw"><div class="lb" id="lb"></div></div></div>

<header>
  <div class="brand">
    <h1>🇮🇹 <b>Italy</b> National Disaster & Sensor Monitor</h1>
  </div>
  <div class="hr">
    <span><span class="live"></span>LIVE</span>
    <span id="hSrc" class="dim">0/0 sources</span>
    <span id="hSta" class="dim">0 stations</span>
    <span class="dim">Updated: <span id="hTm">—</span></span>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab on" onclick="stab('src')">Sources</div>
      <div class="tab" onclick="stab('alr')" id="alertTab">Alerts <span id="alertBadge" class="alert-tab-badge" style="display:none">0</span></div>
      <div class="tab" onclick="stab('det')">Detail</div>
    </div>
    <div class="tc on" id="tSrc">
      <div class="pills" id="pills"></div>
      <div id="srcList"></div>
    </div>
    <div class="tc" id="tAlr">
      <div class="af-summary" id="alertSummary"></div>
      <div class="alert-feed" id="alertFeed"></div>
    </div>
    <div class="tc" id="tDet">
      <div class="dp" id="detP">
        <div class="ns" id="ns">Click a station on the map</div>
        <div id="detC" style="display:none"></div>
      </div>
    </div>
  </div>
  <div class="mw">
    <div id="map"></div>
    <div class="ab" id="ab"></div>
    <button class="alert-sound-btn" onclick="toggleAlertSound()" id="soundBtn" title="Toggle alert sound">🔔 Sound ON</button>
    <div class="ml" id="ml"></div>
  </div>
</div>

<div class="bb">
  <span>Italy National Disaster Monitoring — 34 Data Sources</span>
  <div class="sts">
    <span><span style="color:var(--dg)">▲</span> <span id="sCrit">0</span> critical</span>
    <span><span style="color:var(--wn)">▲</span> <span id="sWarn">0</span> warnings</span>
    <span><span style="color:var(--ok)">●</span> <span id="sOk">0</span> online</span>
    <span><span style="color:var(--dg)">●</span> <span id="sEr">0</span> failed</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  VERIFIED DATA SOURCES — ALL WITH CONFIRMED WORKING ENDPOINTS
// ═══════════════════════════════════════════════════════════════

const S = [

  { id:'liguria',  n:'ARPAL Liguria OMIRL',     r:'nord-ovest', t:'weather', c:'#2563eb', e:'⛈️',

const REGIONS=[
  {id:'all',n:'All Italy',e:'🇮🇹'},{id:'national',n:'National',e:'🏛️'},
  {id:'nord-ovest',n:'Nord-Ovest',e:'🔵'},{id:'nord-est',n:'Nord-Est',e:'🔵'},
  {id:'centro',n:'Centro',e:'🟡'},{id:'sud',n:'Sud',e:'🟠'},{id:'isole',n:'Isole',e:'🏝️'}
];

// Italian tide gauge stations (static - coordinates compiled from ISPRA)
const TIDE_STATIONS=[
  {n:'Genova',lat:44.4103,lng:8.9269},{n:'La Spezia',lat:44.1024,lng:9.8281},

function renderSrcList(){
  const f=aReg==='all'?S:S.filter(s=>s.r===aReg);
  let h='',lr='';
  f.forEach(s=>{
    if(s.r!==lr){const rr=REGIONS.find(x=>x.id===s.r);h+=`<div class="sh">${rr?.e||''} ${rr?.n||s.r}</div>`;lr=s.r;}
    const st=status[s.id]||{s:'pd',c:0};
    h+=`<div class="si ${st.s==='ok'?'on':''}" onclick="togSrc('${s.id}')">
      <div class="sd ${st.s}"></div>
      <div class="sn"><span>${s.e} ${s.n}</span><small>${s.info?.slice(0,50)||s.t}</small></div>
      <div class="sc">${st.c||'—'}</div></div>`;
  });

function togSrc(id){
  const st=status[id]; if(!st||!layers[id])return;
  if(map.hasLayer(layers[id])){map.removeLayer(layers[id]);st.s='er';}
  else{map.addLayer(layers[id]);st.s='ok';}
  renderSrcList(); updStats();
}

// ─── LOAD ALL ───
async function loadAll(){
  let done=0;const tot=S.length;
  for(let i=0;i<S.length;i+=6){
    const batch=S.slice(i,i+6);
    await Promise.all(batch.map(async s=>{
      try{
        slt(`Loading ${s.n}...`); status[s.id]={s:'ld',c:0};
        await loadSrc(s);
      }catch(e){console.warn(`FAIL ${s.id}:`,e);status[s.id]={s:'er',c:0,err:e.message};}
      done++; slp((done/tot)*100);
    }));
  }
  // Run alert evaluation after all sources loaded
  evaluateAlerts();
  updStats(); renderSrcList(); renderLeg(); renderAlerts();
  document.getElementById('hTm').textContent=new Date().toLocaleTimeString('it-IT');
}

async function loadSrc(src){
  if(!src.url&&src.p!=='static_tide'){status[src.id]={s:'pd',c:0};return;}

  let feats=[];
  if(src.p==='static_tide'){
    // Use hardcoded tide stations
    feats=TIDE_STATIONS.map(t=>({_tide:true,...t}));
  } else if(src.p==='trentino'){
    // Parse XML
    feats=await parseTrentinoXML(src.url);
  } else if(src.p==='arpae'){
    feats=await parseARPAE(src.url);
  } else {
    let url=src.url;
    if(url.includes('{7d}')){const d=new Date(Date.now()-7*864e5);url=url.replace('{7d}',d.toISOString().split('T')[0]);}
    if(url.includes('{30d}')){const d=new Date(Date.now()-30*864e5);url=url.replace('{30d}',d.toISOString().split('T')[0]);}
    const resp=await fetch(url);
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data=await resp.json();
    if(data.features) feats=data.features;
    else if(Array.isArray(data)) feats=data;
    else if(data.data&&Array.isArray(data.data)) feats=data.data;
  }

  if(!feats.length){status[src.id]={s:'er',c:0,err:'No data'};return;}

  // Remove old layer
  if(layers[src.id]) map.removeLayer(layers[src.id]);
  const grp=L.markerClusterGroup({
    maxClusterRadius:35,showCoverageOnHover:false,
    iconCreateFunction:c=>L.divIcon({
      html:`<div style="background:${src.c};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid rgba(255,255,255,.3);box-shadow:0 0 8px ${src.c}55">${c.getChildCount()}</div>`,
      className:'',iconSize:[26,26]
    })
  });

  let cnt=0;
  feats.forEach((f,i)=>{
    const parsed=parseF(src,f);
    if(!parsed)return;
    const{lat,lng,popup,name,reading}=parsed;
    const uid=`${src.id}__${cnt}`;
    stations[uid]={source:src,lat,lng,reading,name,raw:f.properties||f};

    let radius=5,col=src.c;
    if(src.t==='earthquake'&&reading.mag!=null){
      radius=Math.max(3,Math.min(reading.mag*2.5,18));
      col=reading.mag>=4?'#ef4444':reading.mag>=3?'#f59e0b':'#fbbf24';
    }
    if(reading.status==='CRITICAL'){col='#ef4444';radius=9;}
    else if(reading.status==='WARNING'){col='#f59e0b';radius=7;}

    const m=L.circleMarker([lat,lng],{radius,fillColor:col,color:'rgba(255,255,255,.2)',weight:1.5,fillOpacity:.8});
    m.bindPopup(popup,{maxWidth:280});
    m.on('click',()=>showDet(uid));
    grp.addLayer(m);
    cnt++;
  });

  layers[src.id]=grp;
  if(src.pri==='now') map.addLayer(grp);
  status[src.id]={s:'ok',c:cnt};
}

// ─── PARSERS ───
function parseF(src,f){
  try{
    if(f._tide) return parseTide(src,f);
    switch(src.p){
      case 'ingv': return parseINGV(src,f);
      case 'pie_idro': return parsePieIdro(src,f);
      case 'pie_rain': return parsePieRain(src,f);
      case 'pie_geo': return parsePieGeo(src,f);
      case 'ispra_l': return parseISPRA(src,f,'Landslide','⛰️');
      case 'ispra_f': return parseISPRA(src,f,'Flood','🌊');
      case 'lombardia': return parseLomb(src,f);
      case 'bolzano': return parseBolz(src,f);
      case 'trentino': return parseTrent(src,f);
      case 'arpae': return parseArpaeF(src,f);
      default: return parseGen(src,f);
    }
  }catch(e){return null;}
}

function parseINGV(src,f){
  const p=f.properties,co=f.geometry?.coordinates;
  if(!co||co.length<2)return null;
  const lat=co[1],lng=co[0],depth=co[2],mag=p.mag||0,place=p.place||'Unknown',
    time=p.time?new Date(p.time).toLocaleString('it-IT'):'',mt=p.magType||'';
  const mc=mag>=4?'#ef4444':mag>=3?'#f59e0b':'#fbbf24';
  return{lat,lng,name:place,reading:{mag,depth,time,place,type:'earthquake'},
    popup:`<div class="pt" style="color:${mc}">🔴 M${mag.toFixed(1)} ${mt}</div>
      <div class="pr"><span class="pl">Location</span><span class="pv">${place}</span></div>
      <div class="pr"><span class="pl">Magnitude</span><span class="pv" style="color:${mc}">${mag.toFixed(1)} ${mt}</span></div>
      <div class="pr"><span class="pl">Depth</span><span class="pv">${depth?.toFixed(1)||'?'} km</span></div>
      <div class="pr"><span class="pl">Time</span><span class="pv">${time}</span></div>
      <div class="pr"><span class="pl">Source</span><span class="pv">INGV</span></div>
      <button class="pb" onclick="showDet('${src.id}__0')">Details →</button>`};
}

function parsePieIdro(src,f){
  const p=f.properties||{},co=f.geometry?.coordinates;if(!co)return null;
  const lat=co[1],lng=co[0],lev=p.i!=null?Number(p.i):null,
    st=parseInt(p.i_stato),status=st>=3?'CRITICAL':st===2?'WARNING':'Normal',
    sc=status==='CRITICAL'?'#ef4444':status==='WARNING'?'#f59e0b':'#22c55e';
  return{lat,lng,name:p.denominazione||'Station',
    reading:{level:lev,status,river:p.corso_acqua,date:p.i_date,type:'hydro'},
    popup:`<div class="pt" style="color:${sc}">${src.e} ${p.denominazione||'Station'}</div>
      ${p.comune?`<div class="pr"><span class="pl">Location</span><span class="pv">${p.comune}</span></div>`:''}
      ${p.corso_acqua?`<div class="pr"><span class="pl">River</span><span class="pv">${p.corso_acqua}</span></div>`:''}
      ${lev!=null?`<div class="pr"><span class="pl">Level</span><span class="pv" style="color:${sc}">${lev.toFixed(2)} m</span></div>`:''}
      <div class="pr"><span class="pl">Status</span><span class="pv" style="color:${sc}">${status}</span></div>
      ${p.i_date?`<div class="pr"><span class="pl">Measured</span><span class="pv">${p.i_date}</span></div>`:''}
      <button class="pb" onclick="showDet('${src.id}__0')">History →</button>`};
}

function parsePieRain(src,f){
  const p=f.properties||{},co=f.geometry?.coordinates;if(!co)return null;
  const lat=co[1],lng=co[0];
  const r3=p.p_3h!=null?Number(p.p_3h):null;
  const r24=p.p_24h!=null?Number(p.p_24h):null;
  const dt=p.p_24h_date||p.p_3h_date||'';
  // Color by intensity
  const maxR=Math.max(r3||0,r24||0);
  const rc=maxR>=30?'#ef4444':maxR>=10?'#f59e0b':maxR>=2?'#06b6d4':'#22c55e';
  return{lat,lng,name:p.denominazione||'Station',
    reading:{cum_rain_3h:r3,cum_rain_24h:r24,date:dt,municipality:p.comune,type:'rain'},
    popup:`<div class="pt" style="color:${rc}">${src.e} ${p.denominazione||'Station'}</div>
      ${p.comune?`<div class="pr"><span class="pl">Location</span><span class="pv">${p.comune}</span></div>`:''}
      ${r3!=null?`<div class="pr"><span class="pl">Rain 3h</span><span class="pv" style="color:${r3>15?'#ef4444':r3>5?'#f59e0b':'#22c55e'}">${r3.toFixed(1)} mm</span></div>`:''}
      ${r24!=null?`<div class="pr"><span class="pl">Rain 24h</span><span class="pv" style="color:${r24>50?'#ef4444':r24>20?'#f59e0b':'#22c55e'}">${r24.toFixed(1)} mm</span></div>`:''}
      ${dt?`<div class="pr"><span class="pl">Measured</span><span class="pv">${dt}</span></div>`:''}
      <div class="pr"><span class="pl">Source</span><span class="pv">ARPA Piemonte</span></div>
      <button class="pb" onclick="showDet('${src.id}__0')">History →</button>`};
}

function parsePieGeo(src,f){
  const p=f.properties||{},co=f.geometry?.coordinates;if(!co)return null;

      ${p.station_type?`<div class="pr"><span class="pl">Type</span><span class="pv">${p.station_type}</span></div>`:''}

function parseISPRA(src,f,label,emoji){
  const p=f.properties||{},co=f.geometry?.coordinates;
  let lat,lng;
  if(f.geometry?.type==='Point'){lat=co[1];lng=co[0];}
  else if(co){const fl=f.geometry.coordinates.flat(Infinity);let sx=0,sy=0,n=0;for(let i=0;i<fl.length-1;i+=2){sx+=fl[i];sy+=fl[i+1];n++;}if(!n)return null;lat=sy/n;lng=sx/n;}
  else return null;
  if(!lat||!lng||isNaN(lat)||isNaN(lng))return null;
  const nm=p.comune||p.nome_dissesto||p.nome||label;
  return{lat,lng,name:nm,reading:{...p,type:label.toLowerCase()},
    popup:`<div class="pt" style="color:${src.c}">${emoji} ${label}</div>
      <div class="pr"><span class="pl">Location</span><span class="pv">${nm}</span></div>
      ${p.provincia?`<div class="pr"><span class="pl">Province</span><span class="pv">${p.provincia}</span></div>`:''}
      ${p.tipo_movimento?`<div class="pr"><span class="pl">Type</span><span class="pv">${p.tipo_movimento}</span></div>`:''}
      ${p.stato_attivita?`<div class="pr"><span class="pl">Activity</span><span class="pv">${p.stato_attivita}</span></div>`:''}
      <div class="pr"><span class="pl">Source</span><span class="pv">ISPRA IdroGEO</span></div>`};
}

function parseLomb(src,f){
  const lat=parseFloat(f.lat||f.Lat||f.latitude),lng=parseFloat(f.lng||f.Lng||f.lon||f.longitude);
  if(!lat||!lng||isNaN(lat)||isNaN(lng))return null;
  const nm=f.nomestazione||f.NomeStazione||f.IdSensore||'Station',
    tip=f.tipologia||f.Tipologia||'',
    val=f.valore||f.Valore,
    unit=f.unitamisura||f.UnitaMisura||'',
    dt=f.dataora||f.DataOra||'';
  return{lat,lng,name:nm,reading:{value:val,unit,tipologia:tip,date:dt,type:'sensor',idsensore:f.idsensore||f.IdSensore},
    popup:`<div class="pt" style="color:${src.c}">${src.e} ${nm}</div>
      ${tip?`<div class="pr"><span class="pl">Type</span><span class="pv">${tip}</span></div>`:''}
      ${val!=null?`<div class="pr"><span class="pl">Value</span><span class="pv" style="color:${src.c}">${val} ${unit}</span></div>`:''}
      ${f.provincia?`<div class="pr"><span class="pl">Province</span><span class="pv">${f.provincia}</span></div>`:''}
      ${dt?`<div class="pr"><span class="pl">Time</span><span class="pv" style="font-size:9px">${dt}</span></div>`:''}
      <div class="pr"><span class="pl">Source</span><span class="pv">ARPA Lombardia</span></div>`};
}

function parseBolz(src,f){
  const lat=f.scoordinate?.y,lng=f.scoordinate?.x;
  if(!lat||!lng)return null;
  const nm=f.sname||f.scode||'Station',val=f.mvalue,tn=f.tname||'',dt=f.mvalidtime||'';
  return{lat,lng,name:nm,reading:{value:val,measurement:tn,date:dt,type:'weather',scode:f.scode},
    popup:`<div class="pt" style="color:${src.c}">${src.e} ${nm}</div>
      ${tn?`<div class="pr"><span class="pl">Measurement</span><span class="pv">${tn}</span></div>`:''}
      ${val!=null?`<div class="pr"><span class="pl">Value</span><span class="pv" style="color:${src.c}">${typeof val==='number'?val.toFixed(1):val}</span></div>`:''}
      ${dt?`<div class="pr"><span class="pl">Time</span><span class="pv" style="font-size:9px">${new Date(dt).toLocaleString('it-IT')}</span></div>`:''}
      <div class="pr"><span class="pl">Source</span><span class="pv">Open Data Hub BZ</span></div>`};

async function parseTrentinoXML(url){
  const resp=await fetch(url);if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
  const txt=await resp.text();
  const parser=new DOMParser();
  const doc=parser.parseFromString(txt,'text/xml');
  const items=doc.querySelectorAll('pointOfMeasureInfo,anagrafica');
  const out=[];
  items.forEach(el=>{
    const code=el.querySelector('code,codice')?.textContent||'';
    const name=el.querySelector('name,nome')?.textContent||'';
    const lat=parseFloat(el.querySelector('latitude,latitudine')?.textContent);
    const lng=parseFloat(el.querySelector('longitude,longitudine')?.textContent);
    const elev=parseFloat(el.querySelector('elevation,quota')?.textContent)||0;
    const end=el.querySelector('enddate,fine')?.textContent||'';
    if(!lat||!lng||isNaN(lat)||isNaN(lng))return;
    if(end&&end.trim())return; // skip decommissioned
    out.push({code,name,lat,lng,elevation:elev});
  });
  return out;
}

async function parseARPAE(url){
  const resp=await fetch(url);if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
  const txt=await resp.text();
  const lines=txt.trim().split('\n').slice(0,500);
  const out=[];
  const seen=new Set();
  lines.forEach(line=>{
    try{
      const obj=JSON.parse(line);
      // ARPAE uses lon*100000 format
      let lat=obj.lat,lng=obj.lon;
      if(lat>100000){lat=lat/100000;}
      if(lng>100000){lng=lng/100000;}
      if(!lat||!lng||isNaN(lat)||isNaN(lng))return;
      // Extract station name from B01019
      let name='Station';
      if(obj.data){
        obj.data.forEach(d=>{
          if(d.vars?.B01019?.v) name=d.vars.B01019.v;
        });
      }
      const key=`${lat.toFixed(3)},${lng.toFixed(3)}`;
      if(seen.has(key))return;
      seen.add(key);
      out.push({lat,lng,name,date:obj.date,network:obj.network,data:obj.data});
    }catch(e){}
  });
  return out;
}

async function loadHist(s,uid){
  const msg=document.getElementById('cm'),cv=document.getElementById('hc');
  if(!msg||!cv)return;

  // ── Piemonte (ALL sub-layers: hydro, rain, temp, snow, wind) ──
  if(s.source.p==='pie_idro'||s.source.p==='pie_geo'||s.source.p==='pie_rain'){
    try{
      const reg=findPieReg(s.lat,s.lng,s.name);
      if(!reg){
        msg.textContent='Station not matched in Piemonte registry (tried name + coords)';
        console.warn('findPieReg failed for',s.name,s.lat,s.lng);
        return;
      }
      msg.textContent=`Loading station ${reg.station_code} (${reg.name})...`;
      const now=new Date(),from=new Date(now-3*864e5);
      const url=`https://utility.arpa.piemonte.it/api_realtime/data_pie?station_code=${reg.station_code}&date_from=${dfmt(from)}&date_to=${dfmt(now)}&page=1&page_size=1000`;
      const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      if(!d.data?.length){msg.textContent=`No data for station ${reg.station_code} in last 3 days`;return;}
      msg.style.display='none';renderHist(cv,d.data);
    }catch(e){console.error('Piemonte history error:',e);msg.textContent='Could not load Piemonte history: '+e.message;}

  // ── INGV Earthquakes ──
  } else if(s.source.p==='ingv'){
    try{
      const now=new Date(),from=new Date(now-30*864e5);
      const url=`https://webservices.ingv.it/fdsnws/event/1/query?format=geojson&starttime=${from.toISOString().split('T')[0]}&minlat=${s.lat-.5}&maxlat=${s.lat+.5}&minlon=${s.lng-.5}&maxlon=${s.lng+.5}&orderby=time&limit=200`;
      const r=await fetch(url);if(!r.ok)throw 0;const d=await r.json();
      if(!d.features?.length){msg.textContent='No nearby events in 30 days';return;}
      msg.style.display='none';renderEqChart(cv,d.features);
    }catch(e){msg.textContent='Could not load seismic data';}

  // ── MeteoTrentino (per-station live data) ──
  } else if(s.source.id==='trent_st'){
    try{
      const code=s.reading.code||s.raw?.code;
      if(!code){msg.textContent='No station code';return;}
      msg.textContent=`Loading ${code}...`;
      const url=`https://dati.meteotrentino.it/service.asmx/ultimiDatiStazione?codice=${code}`;
      const r=await fetch(url);if(!r.ok)throw 0;
      const txt=await r.text();
      msg.style.display='none';
      renderTrentChart(cv,txt);
    }catch(e){msg.textContent='Could not load MeteoTrentino data';}

  // ── ARPA Lombardia (sensor readings time series) ──
  } else if(s.source.id==='lomb'){
    try{
      const sensorId=s.raw?.idsensore||s.reading?.idsensore;
      if(!sensorId){msg.textContent='No sensor ID available';return;}
      msg.textContent=`Loading sensor ${sensorId}...`;
      const now=new Date(),from=new Date(now-3*864e5);
      const fromStr=from.toISOString().split('.')[0];
      const url=`https://www.dati.lombardia.it/resource/647i-nhxk.json?$where=idsensore='${sensorId}' AND data > '${fromStr}'&$order=data ASC&$limit=1000`;
      const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      if(!d.length){msg.textContent=`No readings for sensor ${sensorId} in last 3 days`;return;}
      msg.style.display='none';
      renderLombChart(cv,d,s.reading?.tipologia||s.raw?.tipologia||'Value',s.reading?.unit||s.raw?.unitamisura||s.raw?.unit_dimisura||'');
    }catch(e){console.error('Lombardia history:',e);msg.textContent='Could not load Lombardia history';}

  // ── Bolzano / Open Data Hub (latest values per station) ──
  } else if(s.source.id==='bolz'){
    try{
      const scode=s.raw?.scode||s.reading?.scode;
      if(!scode){msg.textContent='No station code';return;}
      msg.textContent=`Loading ${scode}...`;
      const url=`https://mobility.api.opendatahub.com/v2/flat/MeteoStation/*/latest?limit=50&distinct=true&where=scode.eq."${scode}"&select=mvalue,tname,mvalidtime`;
      const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      if(!d.data?.length){msg.textContent=`No recent data for ${scode}`;return;}
      msg.style.display='none';
      renderBolzDetail(cv,d.data,s.name);
    }catch(e){console.error('Bolzano history:',e);msg.textContent='Could not load Bolzano data';}

  // ── ISPRA flood/landslide — event data, not time series ──
  } else if(s.source.p==='ispra_l'||s.source.p==='ispra_f'){
    msg.textContent='ISPRA event database — no time series. Event details shown above.';

  // ── Tide gauges ──
  } else if(s.source.p==='static_tide'){
    msg.textContent='Tide gauge data requires mareografico.it portal access.';

  // ── ARPAE — single snapshot data ──
  } else if(s.source.id==='arpae'){
    msg.textContent='ARPAE provides real-time snapshots. Per-station history requires SIMC/Dext3r portal.';

  } else {
    msg.textContent='Historical data not yet available for this source.';
  }
}

function findPieReg(lat,lng,name){
  // 1) Exact name match
  if(name){
    const n=name.toUpperCase().trim();
    const exact=pieReg.find(s=>s.name&&s.name.toUpperCase().trim()===n);
    if(exact)return exact;
    // 2) Partial/fuzzy name match (first word)
    const firstWord=n.split(/[\s\-\/]+/)[0];
    if(firstWord.length>=4){
      const partial=pieReg.find(s=>s.name&&s.name.toUpperCase().startsWith(firstWord));
      if(partial)return partial;
    }
  }
  // 3) Closest by coordinates — generous threshold of 0.05° (~5km)
  let best=null,minD=.05;
  pieReg.forEach(s=>{if(!s.lat||!s.lng)return;const d=Math.hypot(s.lat-lat,s.lng-lng);if(d<minD){minD=d;best=s;}});
  return best;
}

function renderTrentChart(cv,xml){
  if(hChart)hChart.destroy();
  const parser=new DOMParser(),doc=parser.parseFromString(xml,'text/xml');
  // XML structure: <temperature><temperatura_aria UM="°C"><data>...</data><temperatura>val</temperatura></temperatura_aria>...
  const temps=[],labels=[],rain=[];

  // Temperature: each <temperatura_aria> has <data> and <temperatura>
  const tempEls=doc.getElementsByTagName('temperatura_aria');
  for(let i=0;i<tempEls.length;i++){
    const el=tempEls[i];
    const t=el.getElementsByTagName('data')[0]?.textContent||'';
    const v=parseFloat(el.getElementsByTagName('temperatura')[0]?.textContent);
    if(!isNaN(v)){temps.push(v);labels.push(t.slice(11,16)||`${i}`);}
  }

  // Precipitation: each <precipitazione> has <pioggia>
  const rainEls=doc.getElementsByTagName('precipitazione');
  for(let i=0;i<rainEls.length;i++){
    const v=parseFloat(rainEls[i].getElementsByTagName('pioggia')[0]?.textContent);
    rain.push(isNaN(v)?0:v);
  }

  // Wind: <vento_al_suolo> has <v> (speed) and <d> (direction)
  const wind=[];
  const windEls=doc.getElementsByTagName('vento_al_suolo');
  for(let i=0;i<windEls.length;i++){
    const v=parseFloat(windEls[i].getElementsByTagName('v')[0]?.textContent);
    wind.push(isNaN(v)?0:v);
  }

  // Humidity: <umidita_relativa> has <u>
  const hum=[];
  const humEls=doc.getElementsByTagName('umidita_relativa');
  for(let i=0;i<humEls.length;i++){
    const v=parseFloat(humEls[i].getElementsByTagName('u')[0]?.textContent);
    hum.push(isNaN(v)?null:v);
  }

  const ds=[];
  if(temps.length)ds.push({label:'Temp (°C)',data:temps,borderColor:'#ef4444',backgroundColor:'#ef444418',fill:true,tension:.3,pointRadius:0,borderWidth:1.5});
  if(rain.some(v=>v>0))ds.push({label:'Rain (mm)',data:rain.slice(0,labels.length),borderColor:'#06b6d4',backgroundColor:'#06b6d418',fill:true,tension:.3,pointRadius:0,borderWidth:1.5});
  if(wind.some(v=>v>0))ds.push({label:'Wind (m/s)',data:wind.slice(0,labels.length),borderColor:'#8b5cf6',backgroundColor:'#8b5cf618',fill:true,tension:.3,pointRadius:0,borderWidth:1.5});
  if(hum.some(v=>v!=null))ds.push({label:'Humidity (%)',data:hum.slice(0,labels.length),borderColor:'#22c55e',backgroundColor:'#22c55e18',fill:true,tension:.3,pointRadius:0,borderWidth:1.5});

  if(!ds.length){document.getElementById('cm').textContent='No chart data in XML';document.getElementById('cm').style.display='block';return;}
  hChart=new Chart(cv,{type:'line',data:{labels,datasets:ds},options:chartOpts()});
}

function renderLombChart(cv,recs,tipologia,unit){
  if(hChart)hChart.destroy();
  const labels=recs.map(r=>{const d=new Date(r.data);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});});

function renderBolzDetail(cv,data,stationName){
  if(hChart)hChart.destroy();
  // Group by measurement type and show as bar chart
  const byType={};
  data.forEach(d=>{
    const tn=d.tname||'unknown';
    if(!byType[tn])byType[tn]=[];
    byType[tn].push({v:d.mvalue,t:d.mvalidtime});
  });
  const labels=Object.keys(byType);
  const values=labels.map(l=>{const arr=byType[l];return arr.length?arr[arr.length-1].v:0;});
  const colors=labels.map((_,i)=>['#06b6d4','#ef4444','#3b82f6','#22c55e','#8b5cf6','#f59e0b'][i%6]);
  hChart=new Chart(cv,{type:'bar',data:{labels,datasets:[
    {label:stationName||'Latest Values',data:values,backgroundColor:colors.map(c=>c+'88'),borderColor:colors,borderWidth:1}
  ]},options:{...chartOpts(),plugins:{legend:{display:false}}}});

// ─── ALERT ENGINE ───
function evaluateAlerts(){
  // Clear previous alerts & markers
  alerts=[];
  alertMarkers.forEach(m=>{try{map.removeLayer(m);}catch(e){}});
  alertMarkers=[];

  Object.entries(stations).forEach(([uid,s])=>{
    try{
    const srcType=s.source.t;
    const thresholds=THRESHOLDS[srcType]||[];
    const reading=s.reading||{};

    // Build location string for this station
    const raw=s.raw||{};
    const loc=[raw.comune||raw.municipality||reading.municipality||'',raw.provincia||raw.province_sign||reading.province||''].filter(Boolean).join(', ');
    const river=raw.corso_acqua||reading.river||'';

    thresholds.forEach(th=>{
      let val=reading[th.field];
      // For Lombardia sensors, check by tipologia
      if(th.op==='custom_lomb'){
        val=parseFloat(reading.value);
        if(isNaN(val))return;
        const tip=(reading.tipologia||'').toLowerCase();
        const locStr=loc?` at ${loc}`:'';
        if(tip.includes('idro')&&val>400){addAlert(uid,s,'critical',`Water level ${val} cm (threshold: 400cm)${locStr}`,s.name);}
        else if(tip.includes('idro')&&val>200){addAlert(uid,s,'warning',`Water level ${val} cm (threshold: 200cm)${locStr}`,s.name);}
        if(tip.includes('piog')&&val>60){addAlert(uid,s,'critical',`Rainfall ${val} mm (threshold: 60mm)${locStr}`,s.name);}
        else if(tip.includes('piog')&&val>30){addAlert(uid,s,'warning',`Rainfall ${val} mm (threshold: 30mm)${locStr}`,s.name);}
        if(tip.includes('temp')&&val>38){addAlert(uid,s,'warning',`Temperature ${val}°C (threshold: 38°C)${locStr}`,s.name);}
        if(tip.includes('vento')&&val>15){addAlert(uid,s,'warning',`Wind speed ${val} m/s (threshold: 15 m/s)${locStr}`,s.name);}
        return;
      }

      if(val==null||val===undefined)return;
      if(typeof val==='string'&&th.op==='eq'){
        if(val===th.value){
          const locStr=loc?` — ${loc}`:'';
          const riverStr=river?` (${river})`:'';
          addAlert(uid,s,th.severity,`${th.label}${riverStr}${locStr}`,s.name);
        }
        return;
      }
      val=parseFloat(val);
      if(isNaN(val))return;

      let triggered=false;
      if(th.op==='>') triggered=val>th.value;
      else if(th.op==='>=') triggered=val>=th.value;
      else if(th.op==='<') triggered=val<th.value;
      else if(th.op==='<=') triggered=val<=th.value;

      if(triggered){
        // Build detailed description with actual value, threshold, and location
        const unit=th.field.includes('mag')?'':th.field.includes('rain')||th.field.includes('cum_rain')?'mm':th.field.includes('temp')?'°C':th.field.includes('wind')||th.field.includes('gust')?'km/h':th.field.includes('level')?'m':th.field.includes('snow')?'cm':th.field.includes('depth')?'km':'';
        const valStr=typeof val==='number'?val.toFixed(1):val;
        const locStr=loc?` — ${loc}`:'';
        const riverStr=river?` (${river})`:'';
        const placeStr=reading.place?` — ${reading.place}`:'';
        const desc=`${th.label}: measured ${valStr}${unit} (threshold: ${th.op}${th.value}${unit})${riverStr}${placeStr}${locStr}`;
        addAlert(uid,s,th.severity,desc,s.name);
      }
    });
    }catch(e){console.warn('Alert eval error for station:',uid,e);}
  });

  // Sort: critical first, then warning, then info
  const sevOrder={critical:0,warning:1,info:2};
  alerts.sort((a,b)=>sevOrder[a.severity]-sevOrder[b.severity]);

  // Add pulsing markers for critical/warning alerts
  const seen=new Set();
  alerts.forEach(a=>{
    if(seen.has(a.uid))return;
    seen.add(a.uid);
    if(a.severity==='critical'||a.severity==='warning'){
      const col=a.severity==='critical'?'#ef4444':'#f59e0b';
      const r=a.severity==='critical'?14:10;
      const pulse=L.circleMarker([a.lat,a.lng],{
        radius:r, fillColor:'transparent', color:col, weight:2.5, fillOpacity:0,
        className:'pulse-marker'
      });
      // Outer glow ring
      const glow=L.circleMarker([a.lat,a.lng],{
        radius:r+6, fillColor:'transparent', color:col, weight:1, fillOpacity:0, opacity:0.4,
        dashArray:'4 4'
      });
      pulse.addTo(map);
      glow.addTo(map);
      alertMarkers.push(pulse,glow);
    }
  });

  // Update banner
  const critCount=alerts.filter(a=>a.severity==='critical').length;
  const warnCount=alerts.filter(a=>a.severity==='warning').length;
  const banner=document.getElementById('ab');
  if(critCount>0){
    banner.textContent=`⚠ ${critCount} CRITICAL alert${critCount>1?'s':''} + ${warnCount} warning${warnCount!==1?'s':''}`;
    banner.style.display='block';
    banner.style.cursor='pointer';
    banner.onclick=()=>stab('alr');
    if(alertSoundOn) playAlertSound();
  } else if(warnCount>0){
    banner.textContent=`⚡ ${warnCount} warning${warnCount!==1?'s':''} detected`;
    banner.style.display='block';
    banner.style.background='rgba(245,158,11,.15)';
    banner.style.borderColor='var(--wn)';
    banner.style.color='var(--wn)';
    banner.style.cursor='pointer';
    banner.onclick=()=>stab('alr');
  } else {
    banner.style.display='none';
  }

  // Badge
  const total=alerts.length;
  const badge=document.getElementById('alertBadge');
  if(total>0){badge.textContent=total;badge.style.display='inline';}
  else{badge.style.display='none';}
}

function addAlert(uid,s,severity,desc,name){
  // Extract location details from reading and raw properties
  const r=s.reading||{};
  const raw=s.raw||{};
  const municipality=r.municipality||raw.comune||raw.municipality||raw.place||'';
  const province=r.province||raw.provincia||raw.province_sign||raw.province||'';
  const river=r.river||raw.corso_acqua||raw.river||'';
  const location=[municipality,province].filter(Boolean).join(', ')||`${s.lat.toFixed(3)}°N, ${s.lng.toFixed(3)}°E`;

  alerts.push({
    uid, severity, desc, name, location, river,
    source:s.source.n, sourceEmoji:s.source.e, sourceColor:s.source.c,
    lat:s.lat, lng:s.lng, time:new Date().toLocaleTimeString('it-IT'),
    reading:r
  });
}

function renderAlerts(){
  // Summary bar
  const crit=alerts.filter(a=>a.severity==='critical').length;
  const warn=alerts.filter(a=>a.severity==='warning').length;
  const info=alerts.filter(a=>a.severity==='info').length;
  document.getElementById('alertSummary').innerHTML=`
    <div class="af-cnt"><span style="color:var(--dg)">▲</span> ${crit} critical</div>
    <div class="af-cnt"><span style="color:var(--wn)">▲</span> ${warn} warnings</div>
    <div class="af-cnt"><span style="color:var(--ac)">ℹ</span> ${info} info</div>
    <div class="af-cnt" style="margin-left:auto;color:var(--dm)">${alerts.length} total</div>
  `;

  // Bottom bar counters
  document.getElementById('sCrit').textContent=crit;
  document.getElementById('sWarn').textContent=warn;

  // Feed
  if(alerts.length===0){
    document.getElementById('alertFeed').innerHTML='<div class="ns" style="padding:30px">No alerts — all readings within normal thresholds</div>';
    return;
  }

  document.getElementById('alertFeed').innerHTML=alerts.map((a,i)=>`
    <div class="af-item sev-${a.severity}" onclick="zoomToAlert(${i})">
      <div class="af-sev ${a.severity}">${a.severity==='critical'?'CRIT':a.severity==='warning'?'WARN':'INFO'}</div>
      <div class="af-body">
        <div class="af-title" style="color:${a.sourceColor}">${a.sourceEmoji} ${a.name}</div>
        <div class="af-desc" style="color:${a.severity==='critical'?'var(--dg)':a.severity==='warning'?'var(--wn)':'var(--tx)'}">${a.desc}</div>
        <div class="af-time">📍 ${a.location}${a.river?' · 🌊 '+a.river:''} · ${a.source} · ${a.time}</div>
      </div>
    </div>
  `).join('');
}

function zoomToAlert(idx){
  const a=alerts[idx];
  if(!a)return;
  map.flyTo([a.lat,a.lng],12,{duration:1});
  // Find and show the station detail
  const uid=a.uid;
  if(stations[uid]) showDet(uid);
}

function playAlertSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Two-tone alert beep
    [440,880].forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;
      osc.type='sine';
      gain.gain.setValueAtTime(0.15,ctx.currentTime+i*0.2);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.2+0.15);
      osc.start(ctx.currentTime+i*0.2);
      osc.stop(ctx.currentTime+i*0.2+0.2);
    });
  }catch(e){}
}

function toggleAlertSound(){
  alertSoundOn=!alertSoundOn;
  document.getElementById('soundBtn').textContent=alertSoundOn?'🔔 Sound ON':'🔕 Sound OFF';
}

// ─── STATS ───
function updStats(){
  let ok=0,er=0,pd=0;
  S.forEach(s=>{const st=status[s.id]?.s;if(st==='ok')ok++;else if(st==='er'||st==='ld')er++;else pd++;});
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sEr').textContent=er;
  document.getElementById('hSrc').textContent=`${ok}/${S.length} sources`;
  document.getElementById('hSta').textContent=`${Object.keys(stations).length} stations`;
}

function renderLeg(){
  const on=S.filter(s=>status[s.id]?.s==='ok');
  let h='<h4>Active Sources</h4>';
  on.forEach(s=>{h+=`<div class="lr"><div class="ld" style="background:${s.c}"></div>${s.e} ${s.n} (${status[s.id]?.c||0})</div>`;});
  if(S.some(s=>status[s.id]?.s==='pd'))h+='<h4>Pending</h4>'+S.filter(s=>status[s.id]?.s==='pd').map(s=>`<div class="lr"><div class="ld" style="background:var(--dm)"></div>${s.e} ${s.n}</div>`).join('');
  document.getElementById('ml').innerHTML=h;
}

// ─── LOADING ───
function slt(t){const e=document.getElementById('lt');if(e)e.textContent=t;}
function slp(p){const e=document.getElementById('lb');if(e)e.style.width=p+'%';}
function hide(){slp(100);setTimeout(()=>document.getElementById('lo').classList.add('hd'),400);}
</script>
